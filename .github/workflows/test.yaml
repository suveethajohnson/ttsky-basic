      - name: Test Summary
        uses: test-summary/action@v2.4
        with:
          paths: "test/results.xml"
        if: always()

      - name: upload waveform and test results
        if: success() || failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: |
            test/tb.fst
            test/results.xml
            test/output/*
