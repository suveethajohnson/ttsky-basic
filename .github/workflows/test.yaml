- name: Run tests
  shell: bash
  run: |
    cd test

    echo "========== CURRENT DIRECTORY =========="
    pwd

    echo "========== ALL FILES =========="
    find .. -maxdepth 3 -type f

    echo "========== CLEAN =========="
    make clean || true

    echo "========== RUNNING MAKE =========="
    make 2>&1 | tee make.log || true

    echo "========== FILES AFTER MAKE =========="
    ls -lah

    echo "========== MAKE LOG =========="
    cat make.log

    if [ ! -f results.xml ]; then
      echo "ERROR: results.xml not generated"
      exit 1
    fi

    echo "========== RESULTS.XML =========="
    cat results.xml

    ! grep -q failure results.xml
